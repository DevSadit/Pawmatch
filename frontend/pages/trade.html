<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade & Rehome – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <!-- Navbar injected by main.js -->

  <div class="page-banner">
    <div class="container">
      <h1>💱 Trade & Rehome</h1>
      <p>Buy, sell, or rehome pets responsibly</p>
    </div>
  </div>

  <div class="container py-5">
    <!-- Tabs: For Sale | Rehome -->
    <ul class="nav nav-pills mb-4" id="tradeTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active me-2" id="saleTab" onclick="filterTradeListings('Sale')">
          💰 For Sale
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="rehomeTab" onclick="filterTradeListings('Rehome')">
          🏠 Rehoming
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="allTab" onclick="filterTradeListings('')">
          🐾 All
        </button>
      </li>
    </ul>

    <!-- Loading -->
    <div id="tradeLoading" class="loading-spinner" style="display:flex;">
      <div class="spinner-border text-primary"><span class="visually-hidden">Loading...</span></div>
    </div>

    <!-- Listings Grid -->
    <div class="row" id="tradeContainer"></div>

    <!-- List Your Own CTA -->
    <div class="text-center mt-5 py-4 bg-light-custom rounded-xl">
      <h5 class="fw-bold">Have a pet to list?</h5>
      <p class="text-muted">Create a listing in minutes — it's free!</p>
      <a href="./add-pet.html" class="btn btn-primary-pawmatch">+ List a Pet</a>
    </div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/pets.js"></script>

  <script>
    let currentFilter = "Sale";

    async function filterTradeListings(status) {
      currentFilter = status;
      const container = document.getElementById("tradeContainer");
      const loading = document.getElementById("tradeLoading");

      // Update active tab
      document.querySelectorAll("#tradeTabs .nav-link").forEach(btn => btn.classList.remove("active"));
      event?.target?.classList.add("active");

      loading.style.display = "flex";
      container.innerHTML = "";

      try {
        const url = status
          ? `${API_BASE}/pets?status=${status}`
          : `${API_BASE}/pets`;

        const response = await fetch(url);
        const pets = await response.json();

        loading.style.display = "none";

        if (pets.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center py-5">
              <div style="font-size:3rem">🐾</div>
              <h4 class="mt-3">No listings found</h4>
              <a href="./add-pet.html" class="btn btn-primary-pawmatch mt-2">+ Add First Listing</a>
            </div>`;
          return;
        }

        pets.forEach(pet => {
          const col = document.createElement("div");
          col.className = "col-md-4 col-sm-6 mb-4";
          col.innerHTML = renderPetCard(pet);
          container.appendChild(col);
        });
      } catch (err) {
        loading.style.display = "none";
        container.innerHTML = `<div class="col-12"><div class="alert alert-danger">Could not load listings. Is the server running?</div></div>`;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      filterTradeListings("Sale");
    });
  </script>
</body>
</html>
