<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Details – PawMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "surface-container-low":    "#f2f1ec",
            "surface-container":        "#e9e8e4",
            "surface-container-high":   "#e3e2de",
            "surface-container-highest":"#deddd8",
            "surface":                  "#f8f6f2",
            "on-surface":               "#2e2f2d",
            "on-surface-variant":       "#5b5c59",
            "primary":                  "#964300",
            "primary-container":        "#f9873e",
            "on-primary":               "#fff0e9",
            "on-primary-container":     "#451b00",
            "secondary":                "#006761",
            "secondary-container":      "#7cf6ec",
            "tertiary":                 "#aa2c32",
            "tertiary-container":       "#ff928e",
            "outline":                  "#777774",
            "outline-variant":          "#aeadaa",
            "error":                    "#b02500",
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily:   { headline: ["Plus Jakarta Sans"], body: ["Be Vietnam Pro"], label: ["Plus Jakarta Sans"] },
        },
      },
    }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-surface font-body text-on-surface pb-32">

  <main class="pt-24 pb-8 px-6 lg:max-w-5xl lg:mx-auto lg:px-12">

    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-xs text-on-surface-variant mb-6 font-medium">
      <a href="../index.html" class="hover:text-primary transition-colors">Home</a>
      <span class="material-symbols-outlined text-sm text-outline-variant">chevron_right</span>
      <a href="./pets.html" class="hover:text-primary transition-colors">Browse Pets</a>
      <span class="material-symbols-outlined text-sm text-outline-variant">chevron_right</span>
      <span class="text-on-surface">Pet Details</span>
    </nav>

    <!-- Loading -->
    <div id="petLoading" class="flex justify-center py-16">
      <div class="w-10 h-10 border-4 border-primary-container border-t-primary rounded-full animate-spin"></div>
    </div>

    <!-- Pet Details (filled by JS) -->
    <div id="petDetailsContainer"></div>

    <!-- Related Pets -->
    <section class="mt-10" id="relatedSection">
      <h4 class="font-headline font-bold text-xl mb-5">You Might Also Like</h4>
      <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3" id="relatedPetsContainer"></div>
    </section>

  </main>

  <script src="../js/main.js"></script>
  <script src="../js/pets.js"></script>
</body>
</html>
