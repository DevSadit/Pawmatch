<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Details – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    .info-detail-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid #e8e8e8;
    }
    .info-detail-label {
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-detail-value {
      font-weight: 600;
      font-size: 0.92rem;
    }
    .pet-details-wrapper {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e8e8e8;
    }
  </style>
</head>
<body>
  <!-- Navbar injected by main.js -->

  <div class="container py-5">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../index.html">Home</a></li>
        <li class="breadcrumb-item"><a href="./pets.html">Browse Pets</a></li>
        <li class="breadcrumb-item active">Pet Details</li>
      </ol>
    </nav>

    <!-- Loading -->
    <div id="petLoading" class="loading-spinner">
      <div class="spinner-border text-primary"><span class="visually-hidden">Loading...</span></div>
    </div>

    <!-- Pet Details (filled by JS) -->
    <div class="pet-details-wrapper" id="petDetailsContainer"></div>

    <!-- Related Pets -->
    <section class="mt-5" id="relatedSection">
      <h4 class="fw-bold mb-4">You Might Also Like</h4>
      <div class="row pets-grid" id="relatedPetsContainer"></div>
    </section>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/pets.js"></script>
</body>
</html>
