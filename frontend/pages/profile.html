<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - PawMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f2f1ec",
            "surface-container": "#e9e8e4",
            "surface-container-high": "#e3e2de",
            "surface-container-highest": "#deddd8",
            "surface": "#f8f6f2",
            "on-surface": "#2e2f2d",
            "on-surface-variant": "#5b5c59",
            "primary": "#964300",
            "primary-container": "#f9873e",
            "on-primary": "#fff0e9",
            "secondary": "#006761",
            "secondary-container": "#7cf6ec",
            "tertiary": "#aa2c32",
            "outline": "#777774",
            "outline-variant": "#aeadaa",
            "error": "#b02500",
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily: { headline: ["Plus Jakarta Sans"], body: ["Be Vietnam Pro"], label: ["Plus Jakarta Sans"] },
        },
      },
    }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-surface font-body text-on-surface pb-32">

  <main class="pt-24 pb-8 px-6 lg:max-w-4xl lg:mx-auto lg:px-12">

    <h1 class="text-3xl font-headline font-extrabold tracking-tight mb-7 lg:text-4xl">My Profile</h1>

    <div id="notLoggedIn" style="display:none;" class="text-center py-16">
      <span class="material-symbols-outlined text-outline text-6xl">lock</span>
      <h4 class="font-headline font-bold text-xl mt-4 mb-2">Not logged in</h4>
      <p class="text-on-surface-variant mb-5">Please login to view your profile.</p>
      <a href="./login.html"
         class="inline-block px-8 py-3 rounded-full font-label font-bold text-sm uppercase tracking-widest text-on-primary"
         style="background:linear-gradient(135deg,#964300,#f9873e)">Login</a>
    </div>

    <div id="profileContent" style="display:none;" class="space-y-6">
      <div class="bg-surface-container-lowest rounded-2xl shadow-sm p-6 flex items-center gap-5">
        <div class="w-16 h-16 rounded-full flex items-center justify-center flex-shrink-0 text-2xl font-headline font-black text-on-primary"
             id="profileAvatar"
             style="background:linear-gradient(135deg,#964300,#f9873e)">U</div>
        <div class="flex-1 min-w-0">
          <h2 class="font-headline font-bold text-xl text-on-surface" id="profileNameDisplay">Loading...</h2>
          <p class="text-on-surface-variant text-sm" id="profileEmailDisplay"></p>
          <span id="profileRoleBadge"
                class="inline-block mt-1 px-3 py-0.5 rounded-full text-xs font-bold font-label"></span>
        </div>
        <div class="hidden sm:flex flex-col gap-2">
          <a href="./manage-listings.html"
             class="text-xs font-bold font-label text-on-surface-variant px-4 py-2 rounded-full bg-surface-container-low hover:bg-surface-container transition-colors">
            My Listings
          </a>
          <a href="./my-matches.html"
             class="text-xs font-bold font-label text-on-surface-variant px-4 py-2 rounded-full bg-surface-container-low hover:bg-surface-container transition-colors">
            My Matches
          </a>
        </div>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl shadow-sm p-6">
        <h3 class="font-headline font-bold text-lg mb-5">Personal Information</h3>
        <form id="updateNameForm" class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1.5">Full Name</label>
            <input type="text" id="newName"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30"
              placeholder="Your name" />
          </div>
          <button type="submit"
            class="px-6 py-2.5 rounded-full font-label font-bold text-xs uppercase tracking-widest text-on-primary active:scale-95 transition-all"
            style="background:linear-gradient(135deg,#964300,#f9873e)">Save Name</button>
        </form>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl shadow-sm p-6">
        <h3 class="font-headline font-bold text-lg mb-1">Pet Preferences</h3>
        <p class="text-on-surface-variant text-xs mb-5">Used for PawSwipe matching recommendations</p>
        <form id="preferencesForm" class="space-y-4">
          <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
            <div>
              <label class="block text-sm font-bold mb-1.5">Preferred Pet Type</label>
              <select id="prefPetType"
                class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
                <option value="">No preference</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Rabbit">Rabbit</option>
                <option value="Bird">Bird</option>
                <option value="Fish">Fish</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1.5">Energy Level</label>
              <select id="prefEnergy"
                class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
                <option value="">No preference</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1.5">Home Type</label>
              <select id="prefHomeType"
                class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
                <option value="">Any</option>
                <option value="Apartment">Apartment</option>
                <option value="House">House</option>
              </select>
            </div>
          </div>
          <button type="submit"
            class="px-6 py-2.5 rounded-full font-label font-bold text-xs uppercase tracking-widest text-on-primary active:scale-95 transition-all"
            style="background:linear-gradient(135deg,#964300,#f9873e)">Save Preferences</button>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      const user = await syncCurrentUser().catch(() => getCurrentUser());

      if (!user) {
        document.getElementById("notLoggedIn").style.display = "block";
        return;
      }

      document.getElementById("profileContent").style.display = "block";
      document.getElementById("profileAvatar").textContent = user.name.charAt(0).toUpperCase();
      document.getElementById("profileNameDisplay").textContent = user.name;
      document.getElementById("profileEmailDisplay").textContent = user.email;
      document.getElementById("newName").value = user.name;

      const badge = document.getElementById("profileRoleBadge");
      if (user.role === "admin") {
        badge.textContent = "Admin";
        badge.style.background = "#fee2e2";
        badge.style.color = "#b02500";
      } else {
        badge.textContent = "User";
        badge.style.background = "#e9e8e4";
        badge.style.color = "#5b5c59";
      }

      if (user.preferences) {
        document.getElementById("prefPetType").value = user.preferences.petType || "";
        document.getElementById("prefEnergy").value = user.preferences.energy || "";
        document.getElementById("prefHomeType").value = user.preferences.homeType || "";
      }

      document.getElementById("updateNameForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        const newName = document.getElementById("newName").value.trim();
        if (!newName) return;

        try {
          const data = await apiFetch("/auth/update", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: newName }),
          });

          setCurrentUser(data.user);
          document.getElementById("profileNameDisplay").textContent = data.user.name;
          document.getElementById("profileAvatar").textContent = data.user.name.charAt(0).toUpperCase();
          showToast("Name updated!", "success");
        } catch {
          showToast("Could not update. Server running?", "error");
        }
      });

      document.getElementById("preferencesForm").addEventListener("submit", async function (event) {
        event.preventDefault();
        const preferences = {
          petType: document.getElementById("prefPetType").value,
          energy: document.getElementById("prefEnergy").value,
          homeType: document.getElementById("prefHomeType").value,
        };

        try {
          const data = await apiFetch("/auth/update", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ preferences }),
          });

          setCurrentUser(data.user);
          showToast("Preferences saved!", "success");
        } catch {
          showToast("Could not save. Server running?", "error");
        }
      });
    });
  </script>
</body>
</html>
