<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body style="background:#f8f9fa;">
  <!-- Navbar injected by main.js -->

  <div class="page-banner">
    <div class="container">
      <h1>👤 My Profile</h1>
      <p>Manage your account and pet preferences</p>
    </div>
  </div>

  <div class="container py-5">
    <!-- Not logged in -->
    <div id="notLoggedIn" style="display:none;" class="text-center py-5">
      <h5>Please <a href="./login.html">login</a> to view your profile.</h5>
    </div>

    <div id="profileContent" style="display:none;">
      <div class="row g-4">
        <!-- Profile Card -->
        <div class="col-md-4">
          <div class="profile-section text-center">
            <div class="sidebar-avatar mx-auto mb-3" id="profileAvatar" style="width:80px;height:80px;font-size:2rem;">U</div>
            <h5 class="fw-bold" id="profileNameDisplay">Loading...</h5>
            <p class="text-muted" id="profileEmailDisplay">...</p>
            <span class="badge" id="profileRoleBadge">User</span>
            <div class="mt-3">
              <a href="./manage-listings.html" class="btn btn-outline-secondary btn-sm">🐾 My Listings</a>
              <a href="./my-matches.html" class="btn btn-outline-secondary btn-sm ms-2">💖 My Matches</a>
            </div>
          </div>
        </div>

        <!-- Edit Form -->
        <div class="col-md-8">
          <!-- Update Name -->
          <div class="profile-section mb-3">
            <h5>Personal Information</h5>
            <form id="updateNameForm" class="form-pawmatch">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="newName" placeholder="Your name" />
              </div>
              <button type="submit" class="btn btn-primary-pawmatch btn-sm">Save Name</button>
            </form>
          </div>

          <!-- Pet Preferences -->
          <div class="profile-section">
            <h5>Pet Preferences</h5>
            <p class="text-muted" style="font-size:0.85rem;">Used for PawSwipe matching recommendations</p>
            <form id="preferencesForm" class="form-pawmatch">
              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label">Preferred Pet Type</label>
                  <select class="form-select" id="prefPetType">
                    <option value="">No preference</option>
                    <option value="Dog">🐶 Dog</option>
                    <option value="Cat">🐱 Cat</option>
                    <option value="Rabbit">🐰 Rabbit</option>
                    <option value="Bird">🐦 Bird</option>
                    <option value="Fish">🐠 Fish</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Energy Level</label>
                  <select class="form-select" id="prefEnergy">
                    <option value="">No preference</option>
                    <option value="Low">🛋️ Low</option>
                    <option value="Medium">🚶 Medium</option>
                    <option value="High">🏃 High</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Home Type</label>
                  <select class="form-select" id="prefHomeType">
                    <option value="">Any</option>
                    <option value="Apartment">Apartment</option>
                    <option value="House">House</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-primary-pawmatch btn-sm">Save Preferences</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async function () {
      const user = getCurrentUser();

      if (!user) {
        document.getElementById("notLoggedIn").style.display = "block";
        return;
      }

      document.getElementById("profileContent").style.display = "block";

      // Populate profile display
      document.getElementById("profileAvatar").textContent = user.name.charAt(0).toUpperCase();
      document.getElementById("profileNameDisplay").textContent = user.name;
      document.getElementById("profileEmailDisplay").textContent = user.email;
      document.getElementById("newName").value = user.name;

      const roleBadge = document.getElementById("profileRoleBadge");
      roleBadge.textContent = user.role === "admin" ? "👑 Admin" : "User";
      roleBadge.className = "badge " + (user.role === "admin" ? "bg-danger" : "bg-secondary");

      // Pre-fill preferences
      if (user.preferences) {
        document.getElementById("prefPetType").value = user.preferences.petType || "";
        document.getElementById("prefEnergy").value = user.preferences.energy || "";
        document.getElementById("prefHomeType").value = user.preferences.homeType || "";
      }

      // Update name
      document.getElementById("updateNameForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const newName = document.getElementById("newName").value.trim();
        if (!newName) return;

        try {
          const response = await fetch(`${API_BASE}/auth/update`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ name: newName }),
          });
          if (response.ok) {
            const data = await response.json();
            setCurrentUser({ ...user, name: newName });
            document.getElementById("profileNameDisplay").textContent = newName;
            document.getElementById("profileAvatar").textContent = newName.charAt(0).toUpperCase();
            showToast("Name updated!", "success");
          }
        } catch (err) {
          showToast("Could not update. Server running?", "error");
        }
      });

      // Update preferences
      document.getElementById("preferencesForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const preferences = {
          petType: document.getElementById("prefPetType").value,
          energy: document.getElementById("prefEnergy").value,
          homeType: document.getElementById("prefHomeType").value,
        };
        try {
          const response = await fetch(`${API_BASE}/auth/update`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ preferences }),
          });
          if (response.ok) {
            setCurrentUser({ ...user, preferences });
            showToast("Preferences saved! ✅", "success");
          }
        } catch (err) {
          showToast("Could not save. Server running?", "error");
        }
      });
    });
  </script>
</body>
</html>
