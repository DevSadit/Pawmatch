<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – PawMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "surface-container-low":    "#f2f1ec",
            "surface-container":        "#e9e8e4",
            "surface-container-high":   "#e3e2de",
            "surface":                  "#f8f6f2",
            "on-surface":               "#2e2f2d",
            "on-surface-variant":       "#5b5c59",
            "primary":                  "#964300",
            "primary-container":        "#f9873e",
            "on-primary":               "#fff0e9",
            "outline":                  "#777774",
            "outline-variant":          "#aeadaa",
            "error":                    "#b02500",
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily:   { headline: ["Plus Jakarta Sans"], body: ["Be Vietnam Pro"] },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .strength-bar { height: 5px; border-radius: 3px; transition: width 0.3s, background 0.3s; }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center px-4 py-20">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings:'FILL' 1,'wght' 600">pets</span>
      <h1 class="font-headline font-black italic text-3xl text-primary mt-1">PawMatch</h1>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-lg p-8">
      <h2 class="font-headline font-bold text-2xl text-on-surface mb-1">Create Account</h2>
      <p class="text-on-surface-variant text-sm mb-6">Join PawMatch and find your perfect pet</p>

      <!-- Error message -->
      <div id="registerError" style="display:none;"
           class="bg-red-50 border-l-4 border-error text-error rounded-xl px-4 py-3 text-sm font-medium mb-5"></div>

      <form id="registerForm" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5" for="name">Full Name</label>
          <input type="text" id="name" required
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30 placeholder-outline-variant"
            placeholder="Your full name" />
        </div>
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5" for="email">Email Address</label>
          <input type="email" id="email" required
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30 placeholder-outline-variant"
            placeholder="your@email.com" />
        </div>
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5" for="password">Password</label>
          <input type="password" id="password" required
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30 placeholder-outline-variant"
            placeholder="At least 6 characters" />
          <div class="mt-2 bg-surface-container rounded-full overflow-hidden">
            <div id="passwordStrength" class="strength-bar" style="width:0%;background:#e3e2de;"></div>
          </div>
          <p class="text-xs text-on-surface-variant mt-1">Minimum 6 characters</p>
        </div>
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30 placeholder-outline-variant"
            placeholder="Repeat your password" />
        </div>
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5">Preferred Pet <span class="font-normal text-on-surface-variant">(optional)</span></label>
          <select id="preferredPet"
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
            <option value="">Not sure yet</option>
            <option value="Dog">🐶 Dog</option>
            <option value="Cat">🐱 Cat</option>
            <option value="Rabbit">🐰 Rabbit</option>
            <option value="Bird">🐦 Bird</option>
            <option value="Fish">🐠 Fish</option>
          </select>
        </div>
        <label class="flex items-start gap-3 cursor-pointer">
          <input type="checkbox" id="agreeTerms" required
            class="mt-0.5 w-4 h-4 accent-primary rounded" />
          <span class="text-xs text-on-surface-variant">I agree to PawMatch's terms and community guidelines</span>
        </label>
        <button type="submit"
          class="w-full py-3.5 rounded-full font-label font-bold text-sm uppercase tracking-widest text-on-primary shadow-md active:scale-95 transition-all"
          style="background:linear-gradient(135deg,#964300,#f9873e)">
          Create Account 🐾
        </button>
      </form>

      <hr class="my-6 border-surface-container-high" />
      <p class="text-center text-sm text-on-surface-variant">
        Already have an account?
        <a href="./login.html" class="text-primary font-bold hover:underline">Login here →</a>
      </p>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
