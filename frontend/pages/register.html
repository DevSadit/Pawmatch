<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #3d5166); min-height:100vh;">
  <!-- Navbar injected by main.js -->

  <div class="container py-4">
    <div class="auth-card" style="max-width:520px;">
      <div class="auth-logo">🐾</div>
      <h2 class="text-center fw-bold">Create Account</h2>
      <p class="text-muted text-center mb-4">Join PawMatch and find your perfect pet</p>

      <!-- Error message -->
      <div id="registerError" style="display:none;" class="mb-3"></div>

      <form id="registerForm" class="form-pawmatch" novalidate>
        <div class="mb-3">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name"
            placeholder="Your full name" required />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email"
            placeholder="your@email.com" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password"
            placeholder="At least 6 characters" required />
          <!-- Password strength bar -->
          <div class="progress mt-2" style="height:5px; border-radius:3px;">
            <div id="passwordStrength" class="progress-bar" style="width:0%; transition:width 0.3s;"></div>
          </div>
          <small class="text-muted">Minimum 6 characters</small>
        </div>
        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword"
            placeholder="Repeat your password" required />
        </div>

        <!-- Pet Preferences (optional) -->
        <div class="mb-3">
          <label class="form-label">Preferred Pet Type <span class="text-muted">(optional)</span></label>
          <select class="form-select" id="preferredPet">
            <option value="">Not sure yet</option>
            <option value="Dog">🐶 Dog</option>
            <option value="Cat">🐱 Cat</option>
            <option value="Rabbit">🐰 Rabbit</option>
            <option value="Bird">🐦 Bird</option>
            <option value="Fish">🐠 Fish</option>
          </select>
        </div>

        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="agreeTerms" required />
            <label class="form-check-label" for="agreeTerms" style="font-size:0.88rem;">
              I agree to PawMatch's terms and community guidelines
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary-pawmatch w-100 btn-lg">
          Create Account 🐾
        </button>
      </form>

      <hr class="my-4" />
      <p class="text-center mb-0" style="font-size:0.9rem;">
        Already have an account?
        <a href="./login.html" class="fw-bold">Login here →</a>
      </p>
    </div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
