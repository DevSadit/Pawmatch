<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Listings – PawMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "surface-container-low":    "#f2f1ec",
            "surface-container":        "#e9e8e4",
            "surface-container-high":   "#e3e2de",
            "surface-container-highest":"#deddd8",
            "surface":                  "#f8f6f2",
            "on-surface":               "#2e2f2d",
            "on-surface-variant":       "#5b5c59",
            "primary":                  "#964300",
            "primary-container":        "#f9873e",
            "on-primary":               "#fff0e9",
            "secondary":                "#006761",
            "secondary-container":      "#7cf6ec",
            "outline":                  "#777774",
            "outline-variant":          "#aeadaa",
            "error":                    "#b02500",
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily:   { headline: ["Plus Jakarta Sans"], body: ["Be Vietnam Pro"], label: ["Plus Jakarta Sans"] },
        },
      },
    }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-surface font-body text-on-surface pb-32">

  <main class="pt-24 pb-8 px-6 lg:max-w-7xl lg:mx-auto lg:px-12">

    <!-- Header row -->
    <div class="flex flex-wrap justify-between items-center gap-3 mb-7">
      <div>
        <h1 class="text-3xl font-headline font-extrabold tracking-tight lg:text-4xl">Manage Listings</h1>
        <p class="text-on-surface-variant text-sm mt-1"><span id="listingCount">0</span> listings</p>
      </div>
      <div class="flex gap-3 items-center">
        <input type="text" id="listingSearch" placeholder="Search listings…"
          class="bg-surface-container-lowest rounded-xl px-4 py-2.5 text-sm font-medium border-none outline-none shadow-sm focus:ring-2 focus:ring-primary/30 w-48" />
        <a href="./add-pet.html"
           class="flex items-center gap-1.5 px-5 py-2.5 rounded-full font-label font-bold text-xs uppercase tracking-widest text-on-primary active:scale-95 transition-all"
           style="background:linear-gradient(135deg,#964300,#f9873e)">
          <span class="material-symbols-outlined text-sm">add</span>Add Pet
        </a>
      </div>
    </div>

    <!-- Listings (filled by JS) -->
    <div id="listingsContainer"></div>

  </main>

  <!-- ===== Edit Modal (custom, no Bootstrap) ===== -->
  <div id="editModal" style="display:none;"
       class="fixed inset-0 z-50 flex items-center justify-center p-4"
       onclick="handleEditModalBackdropClick(event)">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-surface-container-lowest rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto z-10">
      <!-- Header -->
      <div class="flex justify-between items-center p-6 pb-4 border-b border-surface-container">
        <h2 class="font-headline font-bold text-xl">Edit Pet Listing</h2>
        <button onclick="closeEditModal()"
          class="w-9 h-9 rounded-full bg-surface-container flex items-center justify-center hover:bg-surface-container-high transition-colors">
          <span class="material-symbols-outlined text-lg">close</span>
        </button>
      </div>
      <!-- Body -->
      <div class="p-6 space-y-4">
        <input type="hidden" id="editPetId" />
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-bold mb-1.5">Pet Name</label>
            <input type="text" id="editPetName"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30" />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Type</label>
            <select id="editPetType"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
              <option value="Dog">Dog</option>
              <option value="Cat">Cat</option>
              <option value="Rabbit">Rabbit</option>
              <option value="Bird">Bird</option>
              <option value="Fish">Fish</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Breed</label>
            <input type="text" id="editPetBreed"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30" />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Age</label>
            <input type="text" id="editPetAge"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30" />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Gender</label>
            <select id="editPetGender"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Unknown">Unknown</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Location</label>
            <input type="text" id="editPetLocation"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30" />
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Status</label>
            <select id="editPetStatus"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30">
              <option value="Adoption">Adoption</option>
              <option value="Rehome">Rehome</option>
              <option value="Sale">Sale</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1.5">Price (৳)</label>
            <input type="number" id="editPetPrice" min="0"
              class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold mb-1.5">Description</label>
          <textarea id="editPetDescription" rows="3"
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium resize-none border-none outline-none focus:ring-2 focus:ring-primary/30"></textarea>
        </div>
        <div>
          <label class="block text-sm font-bold mb-1.5">Image URL</label>
          <input type="url" id="editPetImage"
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30" />
        </div>
        <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
          <input type="checkbox" id="editPetVaccinated" class="w-4 h-4 accent-primary rounded" />
          Vaccinated
        </label>
      </div>
      <!-- Footer -->
      <div class="flex justify-end gap-3 p-6 pt-4 border-t border-surface-container">
        <button onclick="closeEditModal()"
          class="px-6 py-2.5 rounded-full font-label font-bold text-xs uppercase tracking-widest text-on-surface-variant bg-surface-container-high active:scale-95 transition-all">
          Cancel
        </button>
        <button id="saveEditBtn" onclick="submitEdit()"
          class="px-6 py-2.5 rounded-full font-label font-bold text-xs uppercase tracking-widest text-on-primary active:scale-95 transition-all"
          style="background:linear-gradient(135deg,#964300,#f9873e)">
          Save Changes
        </button>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/crud.js"></script>
  <script>
    function handleEditModalBackdropClick(event) {
      if (event.target === event.currentTarget) {
        closeEditModal();
      }
    }

    function closeEditModal() {
      document.getElementById("editModal").style.display = "none";
    }
  </script>
</body>
</html>
