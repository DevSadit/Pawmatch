<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Pet Listing – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <!-- Navbar injected by main.js -->

  <div class="page-banner">
    <div class="container">
      <h1>➕ Add Pet Listing</h1>
      <p>List a pet for adoption, sale, or rehoming</p>
    </div>
  </div>

  <div class="container py-5">
    <!-- Login required message (shown by JS if not logged in) -->
    <div id="loginRequiredMsg" style="display:none;" class="text-center py-5">
      <div style="font-size:3rem;">🔒</div>
      <h4 class="mt-3">Login Required</h4>
      <p class="text-muted">You must be logged in to add a pet listing.</p>
      <a href="./login.html" class="btn btn-primary-pawmatch">Login Now</a>
    </div>

    <!-- Add Pet Form -->
    <div id="formWrapper">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="info-box">
            <h5 class="fw-bold mb-4">🐾 Pet Information</h5>
            <form id="addPetForm" class="form-pawmatch" novalidate>

              <!-- Row 1 -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Pet Name *</label>
                  <input type="text" class="form-control" id="petName" placeholder="e.g. Bella" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Pet Type *</label>
                  <select class="form-select" id="petType" required>
                    <option value="">Select type</option>
                    <option value="Dog">🐶 Dog</option>
                    <option value="Cat">🐱 Cat</option>
                    <option value="Rabbit">🐰 Rabbit</option>
                    <option value="Bird">🐦 Bird</option>
                    <option value="Fish">🐠 Fish</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>

              <!-- Row 2 -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Breed *</label>
                  <input type="text" class="form-control" id="petBreed" placeholder="e.g. Golden Retriever" required />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Age</label>
                  <input type="text" class="form-control" id="petAge" placeholder="e.g. 2 years" />
                </div>
                <div class="col-md-3">
                  <label class="form-label">Gender</label>
                  <select class="form-select" id="petGender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Unknown">Unknown</option>
                  </select>
                </div>
              </div>

              <!-- Row 3 -->
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Location</label>
                  <input type="text" class="form-control" id="petLocation" placeholder="e.g. Dhaka" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Listing Status *</label>
                  <select class="form-select" id="petStatus" required>
                    <option value="Adoption">💖 Adoption (Free)</option>
                    <option value="Rehome">🏠 Rehome</option>
                    <option value="Sale">💰 For Sale</option>
                  </select>
                </div>
              </div>

              <!-- Price (shown only for Sale) -->
              <div class="mb-3" id="priceGroup" style="display:none;">
                <label class="form-label">Price (৳)</label>
                <input type="number" class="form-control" id="petPrice" placeholder="0" min="0" />
              </div>

              <!-- Row 4 -->
              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label">Energy Level</label>
                  <select class="form-select" id="petEnergy">
                    <option value="Low">🛋️ Low</option>
                    <option value="Medium" selected>🚶 Medium</option>
                    <option value="High">🏃 High</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Ideal Home Type</label>
                  <select class="form-select" id="petHomeType">
                    <option value="Any">Any</option>
                    <option value="Apartment">Apartment</option>
                    <option value="House">House</option>
                    <option value="Large Property">Large Property</option>
                  </select>
                </div>
                <div class="col-md-4 d-flex align-items-end gap-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="petVaccinated" />
                    <label class="form-check-label" for="petVaccinated">Vaccinated</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="petKids" />
                    <label class="form-check-label" for="petKids">Good with Kids</label>
                  </div>
                </div>
              </div>

              <!-- Description -->
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="petDescription" rows="4"
                  placeholder="Describe the pet's personality, history, and why they need a new home..."></textarea>
              </div>

              <!-- Image URL -->
              <div class="mb-4">
                <label class="form-label">Pet Photo URL</label>
                <input type="url" class="form-control" id="petImage"
                  placeholder="https://example.com/pet-photo.jpg" />
                <small class="text-muted">Paste a direct link to the pet's photo</small>
              </div>

              <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary-pawmatch btn-lg flex-fill">
                  🐾 Submit Listing
                </button>
                <a href="./manage-listings.html" class="btn btn-outline-secondary btn-lg">
                  Cancel
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/crud.js"></script>
</body>
</html>
