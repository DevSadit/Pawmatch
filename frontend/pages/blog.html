<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    .blog-card { cursor: pointer; }
    .blog-card:hover img { transform: scale(1.03); }
    .blog-card img { transition: transform 0.3s ease; }
    .category-filter-btn {
      border: 1.5px solid #e8e8e8;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      background: white;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      margin: 3px;
    }
    .category-filter-btn:hover,
    .category-filter-btn.active {
      border-color: #ff6b35;
      color: #ff6b35;
      background: #fff3ef;
    }
  </style>
</head>
<body>
  <!-- Navbar injected by main.js -->

  <div class="page-banner">
    <div class="container">
      <h1>📝 Pet Care Blog</h1>
      <p>Expert tips, guides, and stories for pet lovers</p>
    </div>
  </div>

  <div class="container py-5">
    <!-- Category Filter Buttons -->
    <div class="text-center mb-4">
      <button class="category-filter-btn active" onclick="filterByCategory('All')">All</button>
      <button class="category-filter-btn" onclick="filterByCategory('Tips')">💡 Tips</button>
      <button class="category-filter-btn" onclick="filterByCategory('Dogs')">🐶 Dogs</button>
      <button class="category-filter-btn" onclick="filterByCategory('Cats')">🐱 Cats</button>
      <button class="category-filter-btn" onclick="filterByCategory('Adoption')">💖 Adoption</button>
      <button class="category-filter-btn" onclick="filterByCategory('Health')">💉 Health</button>
    </div>

    <!-- Loading -->
    <div id="blogLoading" class="loading-spinner" style="display:flex;">
      <div class="spinner-border text-primary"><span class="visually-hidden">Loading...</span></div>
    </div>

    <!-- Blog Cards Grid (filled by JS via AJAX) -->
    <div class="row" id="blogContainer"></div>
  </div>

  <!-- ===== BLOG POST MODAL ===== -->
  <div class="modal fade" id="blogModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content" style="border-radius:20px; border:none;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="modalBlogTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-3" id="modalBlogMeta" style="font-size:0.85rem;"></p>
          <img id="modalBlogImage" src="" alt="" class="img-fluid rounded mb-4" style="width:100%; max-height:320px; object-fit:cover;">
          <div id="modalBlogContent" style="font-size:0.95rem; line-height:1.8; color:#444;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/blog.js"></script>
</body>
</html>
