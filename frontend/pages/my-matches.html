<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Matches – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <!-- Navbar injected by main.js -->

  <div class="page-banner">
    <div class="container">
      <h1>💖 My Matches</h1>
      <p>Pets you've liked through PawSwipe</p>
    </div>
  </div>

  <div class="container pb-5">
    <!-- Header row -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <span class="text-muted fw-semibold"><span id="matchesCount">0</span> saved matches</span>
      </div>
      <div class="d-flex gap-2">
        <a href="./pawswipe.html" class="btn btn-primary-pawmatch btn-sm">🐾 Continue Swiping</a>
        <button class="btn btn-outline-danger btn-sm" id="clearAllMatches">🗑️ Clear All</button>
      </div>
    </div>

    <!-- Empty state -->
    <div id="matchesEmpty" style="display:none;" class="text-center py-5">
      <div style="font-size:5rem">💔</div>
      <h4 class="mt-3">No matches yet</h4>
      <p class="text-muted">Go to PawSwipe and start liking pets!</p>
      <a href="./pawswipe.html" class="btn btn-primary-pawmatch">🐾 Start PawSwiping</a>
    </div>

    <!-- Matches Grid (filled by JS) -->
    <div class="row" id="matchesContainer"></div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/my-matches.js"></script>
</body>
</html>
