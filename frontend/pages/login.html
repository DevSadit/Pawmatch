<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – PawMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;1,800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-lowest": "#ffffff",
            "surface-container-low":    "#f2f1ec",
            "surface-container":        "#e9e8e4",
            "surface-container-high":   "#e3e2de",
            "surface":                  "#f8f6f2",
            "on-surface":               "#2e2f2d",
            "on-surface-variant":       "#5b5c59",
            "primary":                  "#964300",
            "primary-container":        "#f9873e",
            "on-primary":               "#fff0e9",
            "outline":                  "#777774",
            "outline-variant":          "#aeadaa",
            "error":                    "#b02500",
          },
          borderRadius: { DEFAULT: "1rem", lg: "2rem", xl: "3rem", full: "9999px" },
          fontFamily:   { headline: ["Plus Jakarta Sans"], body: ["Be Vietnam Pro"] },
        },
      },
    }
  </script>
  <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center px-4 py-20">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings:'FILL' 1,'wght' 600">pets</span>
      <h1 class="font-headline font-black italic text-3xl text-primary mt-1">PawMatch</h1>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-2xl shadow-lg p-8">
      <h2 class="font-headline font-bold text-2xl text-on-surface mb-1">Welcome back!</h2>
      <p class="text-on-surface-variant text-sm mb-6">Login to your PawMatch account</p>

      <!-- Demo hint -->
      <div class="bg-surface-container-low rounded-xl px-4 py-3 text-xs text-on-surface-variant mb-5">
        <strong class="text-on-surface">Demo:</strong> admin@pawmatch.com / admin123
      </div>

      <!-- Error message -->
      <div id="loginError" style="display:none;"
           class="bg-red-50 border-l-4 border-error text-error rounded-xl px-4 py-3 text-sm font-medium mb-5"></div>

      <form id="loginForm" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5" for="email">Email Address</label>
          <input type="email" id="email" required
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30 placeholder-outline-variant"
            placeholder="your@email.com" />
        </div>
        <div>
          <label class="block text-sm font-bold text-on-surface mb-1.5" for="password">Password</label>
          <input type="password" id="password" required
            class="w-full bg-surface-container-low rounded-xl px-4 py-3 text-on-surface text-sm font-medium border-none outline-none focus:ring-2 focus:ring-primary/30 placeholder-outline-variant"
            placeholder="Enter your password" />
        </div>
        <button type="submit"
          class="w-full py-3.5 rounded-full font-label font-bold text-sm uppercase tracking-widest text-on-primary shadow-md active:scale-95 transition-all"
          style="background:linear-gradient(135deg,#964300,#f9873e)">
          Login
        </button>
      </form>

      <hr class="my-6 border-surface-container-high" />
      <p class="text-center text-sm text-on-surface-variant">
        Don't have an account?
        <a href="./register.html" class="text-primary font-bold hover:underline">Register here →</a>
      </p>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
