<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body style="background: linear-gradient(135deg, #2c3e50, #3d5166); min-height:100vh;">
  <!-- Navbar injected by main.js -->

  <div class="container py-5">
    <div class="auth-card">
      <div class="auth-logo">🐾</div>
      <h2 class="text-center fw-bold">Welcome Back!</h2>
      <p class="text-muted text-center mb-4">Login to your PawMatch account</p>

      <!-- Error message area -->
      <div id="loginError" style="display:none;" class="mb-3"></div>

      <!-- Demo credentials hint -->
      <div class="alert alert-info py-2 mb-3" style="font-size:0.82rem; border-radius:10px;">
        <strong>Demo:</strong> admin@pawmatch.com / admin123 &nbsp;|&nbsp; jane@example.com / password123
      </div>

      <form id="loginForm" class="form-pawmatch" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email"
            placeholder="Enter your email" required />
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password"
            placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn btn-primary-pawmatch w-100 btn-lg">
          Login
        </button>
      </form>

      <hr class="my-4" />
      <p class="text-center mb-0" style="font-size:0.9rem;">
        Don't have an account?
        <a href="./register.html" class="fw-bold">Register here →</a>
      </p>
    </div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
