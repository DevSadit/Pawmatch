<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Pets – PawMatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <style>
    .filter-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border: 1px solid #e8e8e8;
      margin-bottom: 30px;
    }
    .info-detail-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 12px;
    }
    .info-detail-label {
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-detail-value {
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- Navbar injected by main.js -->

  <!-- Page Banner -->
  <div class="page-banner">
    <div class="container">
      <h1>🐾 Browse Pets</h1>
      <p>Find your perfect companion from our listings</p>
    </div>
  </div>

  <div class="container pb-5">
    <!-- ---- Filter Bar ---- -->
    <div class="filter-card">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label fw-semibold mb-1">🔍 Search</label>
          <input type="text" class="form-control" id="searchInput"
            placeholder="Search by name or breed..." />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-semibold mb-1">Type</label>
          <select class="form-select" id="typeFilter">
            <option value="">All Types</option>
            <option value="Dog">🐶 Dog</option>
            <option value="Cat">🐱 Cat</option>
            <option value="Rabbit">🐰 Rabbit</option>
            <option value="Bird">🐦 Bird</option>
            <option value="Fish">🐠 Fish</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label fw-semibold mb-1">Status</label>
          <select class="form-select" id="statusFilter">
            <option value="">All</option>
            <option value="Adoption">Adoption</option>
            <option value="Sale">For Sale</option>
            <option value="Rehome">Rehome</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label fw-semibold mb-1">Location</label>
          <input type="text" class="form-control" id="locationFilter" placeholder="e.g. Dhaka" />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-semibold mb-1">Sort By</label>
          <select class="form-select" id="sortPets">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="name-asc">Name A-Z</option>
            <option value="name-desc">Name Z-A</option>
          </select>
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary-pawmatch" id="applyFilters">Apply Filters</button>
        <button class="btn btn-outline-secondary" id="resetFilters">Reset</button>
      </div>
    </div>

    <!-- Result Count -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted fw-semibold" id="petsCount"></span>
      <a href="./add-pet.html" class="btn btn-sm btn-outline-pawmatch">+ List a Pet</a>
    </div>

    <!-- Loading Spinner -->
    <div id="petsLoading" class="loading-spinner" style="display:flex;">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- Pets Grid -->
    <div class="row pets-grid" id="petsContainer"></div>
  </div>

  <!-- Footer injected by main.js -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/pets.js"></script>

  <script>
    // Check for type filter in URL params (from home page category links)
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const typeParam = urlParams.get("type");
      if (typeParam) {
        const typeFilter = document.getElementById("typeFilter");
        if (typeFilter) typeFilter.value = typeParam;
      }
    });
  </script>
</body>
</html>
